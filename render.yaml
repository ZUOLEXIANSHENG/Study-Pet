services:
  - type: web
    name: study-pet-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_MODEL
        value: deepseek-v4-flash
      - key: LLM_TIMEOUT_SECONDS
        value: "20"
      - key: LLM_API_KEY
        sync: false
